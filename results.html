<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>نتائج التحاليل الطبية</title>
  <link id="resultsFavicon" rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a5f7a'/%3E%3Cpath d='M18 18h10v28h18v8H18z' fill='%23ffffff'/%3E%3C/svg%3E" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg1: #0f2746;
      --bg2: #1a5f7a;
      --card: rgba(255,255,255,.96);
      --text: #16304a;
      --muted: #6a7c92;
      --accent: #0d9488;
      --accent2: #2563eb;
    }
    * { box-sizing: border-box; font-family: "Segoe UI", Tahoma, Arial, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.18), transparent 25%),
        linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: var(--text);
      direction: rtl;
    }
    .page {
      width: min(960px, calc(100% - 28px));
      margin: 24px auto;
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 24px 60px rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .hero-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .hero-logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 16px 36px rgba(0,0,0,0.12);
      flex-shrink: 0;
    }
    .hero-logo.visible {
      display: inline-flex;
    }
    .hero-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: white;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .summary div {
      background: rgba(255,255,255,0.9);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }
    .summary div:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .summary strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 15px 10px;
      border-bottom: 1px solid #e6eef7;
      text-align: left;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    th {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: sticky;
      top: 0;
    }
    tr:nth-child(even) {
      background: rgba(102,126,234,0.05);
    }
    tr:hover {
      background: rgba(102,126,234,0.1);
      transform: scale(1.01);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .btn {
      min-height: 48px;
      padding: 0 18px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(37,99,235,0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37,99,235,0.4);
    }
    .notice {
      background: linear-gradient(90deg, rgba(255,107,107,0.9), rgba(238,90,36,0.9));
      color: white;
      border-radius: 20px;
      padding: 18px;
      line-height: 1.9;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .muted {
      color: var(--muted);
    }
    .error {
      color: #b91c1c;
      font-weight: 700;
    }
    .pending {
      color: #9a6700;
      font-weight: 700;
    }
    @media print {
      body { background: white; }
      .notice, .actions { display: none; }
      .card { box-shadow: none; border: 1px solid #eee; }
    }
    @media (max-width: 720px) {
      .summary {
        grid-template-columns: 1fr;
      }
      .card {
        padding: 16px;
        border-radius: 16px;
      }
      .hero h1 {
        font-size: 28px;
      }
      table {
        font-size: 12px;
      }
      th, td {
        padding: 8px 6px;
      }
      .btn {
        min-height: 44px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="card hero">
      <div class="hero-brand">
        <div class="hero-logo" id="heroLogoBox">
          <img id="heroLogoImage" alt="شعار المختبر" />
        </div>
      </div>
      <div class="muted" id="brandLead" style="font-weight:700;margin-bottom:8px;"></div>
      <h1 id="brandTitle"></h1>
      <div style="text-align:center; margin-bottom:16px; font-weight:700; color:var(--accent);">
        <span id="centerName">مختبر التحاليل الطبية</span>
      </div>
      <p id="statusText">جارٍ تحميل النتائج...</p>
      <div class="summary">
        <div>
          <strong>الاسم</strong>
          <span id="patientName">-</span>
        </div>
        <div>
          <strong>العمر / الجنس</strong>
          <span id="patientAgeGender">-</span>
        </div>
        <div>
          <strong>الجنسية</strong>
          <span id="patientNationality">-</span>
        </div>
        <div>
          <strong>آخر تحديث</strong>
          <span id="resultDate">-</span>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="btnExportResultsPdf" type="button">تنزيل ملف النتائج PDF</button>
      </div>
      <div class="muted" id="brandFooter" style="margin-top:14px;">يتم عرض النتائج بحسب إعدادات المنشأة الطبية المحفوظة مع الطلب.</div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;">جدول النتائج</h2>
      <table>
        <thead>
          <tr>
            <th>التحليل</th>
            <th>النتيجة</th>
            <th>الوحدة</th>
            <th>المدى المرجعي</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr><td colspan="4" class="muted">بانتظار البيانات...</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <script>
    const statusText = document.getElementById('statusText');
    const patientName = document.getElementById('patientName');
    const patientAgeGender = document.getElementById('patientAgeGender');
    const patientNationality = document.getElementById('patientNationality');
    const resultDate = document.getElementById('resultDate');
    const resultsBody = document.getElementById('resultsBody');
    const btnExportResultsPdf = document.getElementById('btnExportResultsPdf');
    const brandTitle = document.getElementById('brandTitle');
    const brandLead = document.getElementById('brandLead');
    const brandFooter = document.getElementById('brandFooter');
    const heroLogoBox = document.getElementById('heroLogoBox');
    const heroLogoImage = document.getElementById('heroLogoImage');
    const resultsFavicon = document.getElementById('resultsFavicon');
    const LOCAL_API_PORT = '3100';
    const API_DISABLED = false; // allow online API sharing when /api endpoint present
    let currentResultData = null;
    const ARABIC_DATE_TIME_FORMATTER = new Intl.DateTimeFormat('ar', {
      day: 'numeric',
      month: 'long',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatArabicDateTime(value) {
      const date = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return ARABIC_DATE_TIME_FORMATTER.format(date);
    }

    function getSavedCenterName() {
      try {
        const saved = window.localStorage.getItem('lis_center_name');
        return saved ? saved : 'مختبر التحاليل الطبية 2026';
      } catch (_e) {
        return 'مختبر التحاليل الطبية 2026';
      }
    }

    function getSavedCenterLogo() {
      try {
        return window.localStorage.getItem('lis_center_logo') || '';
      } catch (_e) {
        return '';
      }
    }

    function applyBrandLogo(logoDataUrl = '') {
      const logo = String(logoDataUrl || '').trim();
      if (heroLogoBox && heroLogoImage) {
        if (logo) {
          heroLogoImage.src = logo;
          heroLogoBox.classList.add('visible');
        } else {
          heroLogoImage.removeAttribute('src');
          heroLogoBox.classList.remove('visible');
        }
      }
      if (resultsFavicon) {
        resultsFavicon.href = logo || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a5f7a'/%3E%3Cpath d='M18 18h10v28h18v8H18z' fill='%23ffffff'/%3E%3C/svg%3E";
      }
    }

    function getDefaultPublicSettings() {
      return {
        headerTitle: '',
        headerLead: '',
        footerText: ''
      };
    }

    function renderBranding(settings) {
      const branding = { ...getDefaultPublicSettings(), ...(settings || {}) };
      const centerName = getSavedCenterName();
      applyBrandLogo(branding.logoDataUrl || getSavedCenterLogo());
      if (brandTitle) brandTitle.textContent = branding.headerTitle || centerName;
      if (brandLead) brandLead.textContent = branding.headerLead || '';
      if (brandFooter) brandFooter.textContent = branding.footerText || '';
      document.title = `${brandTitle.textContent || centerName} - نتائج أونلاين`;
    }

    function isLocalDevelopmentHost(hostname = window.location.hostname) {
      return /^(localhost|127\.0\.0\.1|10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.)/i.test(hostname);
    }

    function getAppBasePath(pathname = window.location.pathname) {
      const normalizedPath = pathname.replace(/\/+/g, '/');
      if (/\/results\/[^/]+\/?$/.test(normalizedPath)) {
        return normalizedPath.replace(/\/results\/[^/]+\/?$/, '');
      }
      if (/\/results\.html$/i.test(normalizedPath)) {
        return normalizedPath.replace(/\/results\.html$/i, '');
      }
      return normalizedPath === '/' ? '' : normalizedPath.replace(/\/$/, '');
    }

    function joinBasePath(basePath, suffix) {
      const prefix = basePath && basePath !== '/' ? basePath.replace(/\/$/, '') : '';
      const route = suffix.startsWith('/') ? suffix : `/${suffix}`;
      return `${prefix}${route}`;
    }

    const APP_BASE_PATH = getAppBasePath();

    function getTokenFromUrl() {
      const queryToken = new URLSearchParams(window.location.search).get('token');
      if (queryToken) return queryToken;

      const pathMatch = window.location.pathname.match(/\/results\/([^/?#]+)/);
      return pathMatch ? decodeURIComponent(pathMatch[1]) : '';
    }

    function buildPhpApiUrl(route, base = '') {
      const scriptPath = base
        ? `${base}${joinBasePath(APP_BASE_PATH, '/api/index.php')}`
        : joinBasePath(APP_BASE_PATH, '/api/index.php');
      return `${scriptPath}?route=${encodeURIComponent(route)}`;
    }

    function getApiBaseCandidates() {
      const bases = [];
      if (window.location.protocol !== 'file:') {
        bases.push('');
      } else {
        bases.push(`http://127.0.0.1:${LOCAL_API_PORT}`);
      }

      if (window.location.protocol !== 'file:' && isLocalDevelopmentHost(window.location.hostname) && window.location.port !== LOCAL_API_PORT) {
        bases.push(`${window.location.protocol}//${window.location.hostname}:${LOCAL_API_PORT}`);
      }

      return [...new Set(bases)];
    }

    function getApiCandidates(route) {
      const candidates = [];
      const cleanRoute = String(route || '').replace(/^\/+/, '');

      for (const base of getApiBaseCandidates()) {
        const restUrl = base
          ? `${base}${joinBasePath(APP_BASE_PATH, `/api/${cleanRoute}`)}`
          : joinBasePath(APP_BASE_PATH, `/api/${cleanRoute}`);
        // favor PHP endpoint first on shared hosting
        candidates.push(buildPhpApiUrl(cleanRoute, base), restUrl);
      }

      return [...new Set(candidates)];
    }

    function renderRows(order) {
      if (!Array.isArray(order) || order.length === 0) {
        resultsBody.innerHTML = '<tr><td colspan="4" class="muted">لا توجد نتائج متاحة حاليًا.</td></tr>';
        return;
      }

      resultsBody.innerHTML = order.map(test => {
        const rawValue = test.numeric && test.numeric !== '' ? test.numeric : (test.result || '');
        const finalValue = test.type && test.type.includes('select-numeric') && test.ct
          ? `${test.result || ''} (Ct=${test.ct})`
          : rawValue || 'لم تُدخل بعد';

        return `
          <tr>
            <td>${escapeHtml(test.name || '')}</td>
            <td>${escapeHtml(finalValue)}</td>
            <td>${escapeHtml(test.unit || '')}</td>
            <td>${escapeHtml(test.ref || '')}</td>
          </tr>
        `;
      }).join('');
    }

    function findLocalOrderByToken(token) {
      try {
        for (let i = 0; i < window.localStorage.length; i++) {
          const key = window.localStorage.key(i);
          if (!key || !key.startsWith('lis_order_')) continue;

          const raw = window.localStorage.getItem(key);
          if (!raw) continue;

          const data = JSON.parse(raw);
          const savedToken = data?.share_token || data?.shareToken || data?.patient?.share_token || null;
          if (savedToken === token) {
            return {
              patient: data.patient || {},
              order: data.order || [],
              settings: data.settings || getDefaultPublicSettings(),
              created_at: data.created_at || data.date || new Date().toISOString(),
              updated_at: data.updated_at || data.date || new Date().toISOString(),
              results_published: !!(data.results_published || data?.patient?.results_published),
              published_at: data.published_at || data?.patient?.published_at || null
            };
          }
        }
      } catch (error) {
        return null;
      }

      return null;
    }

    function renderLoadedResult(data) {
      currentResultData = data;
      renderBranding(data.settings);
      const title = data.patient?.title || '';
      const name = data.patient?.name || '-';
      const fullName = title ? `${title} ${name}` : name;
      if (patientName) patientName.textContent = fullName;
      if (patientAgeGender) patientAgeGender.textContent = `${data.patient?.age || '-'} / ${data.patient?.gender === 'F' ? 'أنثى' : 'ذكر'}`;
      if (patientNationality) patientNationality.textContent = data.patient?.nationality || '-';
      if (resultDate) resultDate.textContent = formatArabicDateTime(data.updated_at || data.created_at);
      if (statusText) statusText.textContent = 'تم تحميل النتائج بنجاح. يمكنك مراجعتها أو تحميلها بصيغة PDF.';
      renderRows(data.order || []);
    }

    async function fetchPublishedResults(token) {
      if (API_DISABLED) {
        throw new Error('API disabled for hosting');
      }

      let lastError = null;

      for (const url of getApiCandidates(`public-results/${token}`)) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (response.status === 423) return response;
          if (response.ok) return response;
          lastError = new Error(`Failed with status ${response.status}`);
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error('Failed to load results');
    }

    function findLocalOrderByToken(token) {
      try {
        const resultToken = String(token || '').trim();
        if (!resultToken) return null;

        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (!key || !key.startsWith('lis_order_')) continue;

          const raw = localStorage.getItem(key);
          if (!raw) continue;

          try {
            const item = JSON.parse(raw);
            if (!item || !item.share_token) continue;
            if (String(item.share_token) !== resultToken) continue;
            return item;
          } catch (error) {
            continue;
          }
        }
      } catch (error) {
        console.warn('Could not read local order from localStorage', error);
      }
      return null;
    }

    async function loadResults() {
      const token = getTokenFromUrl();
      if (!token) {
        renderBranding();
        statusText.innerHTML = '<span class="error">رابط النتائج غير صالح.</span>';
        return;
      }

      try {
        const response = await fetchPublishedResults(token);
        if (response.status === 423) {
          let pendingData = {};
          try {
            pendingData = await response.json();
          } catch (error) {
            pendingData = {};
          }
          renderBranding(pendingData.settings);
          statusText.innerHTML = '<span class="pending">لم يتم إدراج النتائج بعد أو لم تُعتمد للنشر حتى الآن.</span>';
          resultsBody.innerHTML = '<tr><td colspan="4" class="pending">لم يتم إدراج النتائج بعد. يرجى مراجعة المختبر أو إعادة المحاولة لاحقًا.</td></tr>';
          return;
        }
        if (!response.ok) throw new Error('Failed to load results');
        const data = await response.json();
        renderLoadedResult(data);
      } catch (error) {
        const localData = findLocalOrderByToken(token);
        if (localData) {
          renderBranding(localData.settings);
          if (!localData.results_published) {
            statusText.innerHTML = '<span class="pending">لم يتم إدراج النتائج بعد أو لم تُنشر بعد.</span>';
            resultsBody.innerHTML = '<tr><td colspan="4" class="pending">تم العثور على الطلب، لكن النتائج لم تُدرج للنشر بعد.</td></tr>';
            return;
          }

          renderLoadedResult(localData);
          return;
        }

        renderBranding();
        currentResultData = null;
        statusText.innerHTML = '<span class="error">تعذر تحميل النتائج. تأكد من صحة الرابط أو حاول لاحقًا.</span>';
        resultsBody.innerHTML = '<tr><td colspan="4" class="error">فشل تحميل النتائج.</td></tr>';
      }
    }

    function buildOnlineResultsPrintDocument(data) {
      const normalizedData = data && typeof data === 'object' ? data : {};
      const patient = normalizedData.patient && typeof normalizedData.patient === 'object' ? normalizedData.patient : {};
      const order = Array.isArray(normalizedData.order) ? normalizedData.order : [];
      const settings = { ...getDefaultPublicSettings(), ...(normalizedData.settings || {}) };
      const centerName = escapeHtml(settings.centerName || getSavedCenterName());
      const title = escapeHtml(settings.headerTitle || settings.centerName || centerName);
      const lead = escapeHtml(settings.headerLead || 'نتائج التحاليل الطبية');
      const footer = escapeHtml(settings.footerText || 'تم توليد هذه النسخة من صفحة النتائج الأونلاين.');
      const logoDataUrl = settings.logoDataUrl || getSavedCenterLogo();
      const logoMarkup = logoDataUrl
        ? `<div class="print-logo"><img src="${logoDataUrl}" alt="شعار المختبر"></div>`
        : '';
      const patientFullName = escapeHtml(`${patient.title ? `${patient.title} ` : ''}${patient.name || '-'}`.trim());
      const ageGender = escapeHtml(`${patient.age || '-'} / ${patient.gender === 'F' ? 'أنثى' : 'ذكر'}`);
      const nationality = escapeHtml(patient.nationality || '-');
      const updatedAt = escapeHtml(formatArabicDateTime(normalizedData.updated_at || normalizedData.created_at || new Date()));
      const rowsHtml = order.length
        ? order.map(test => {
            const rawValue = test.numeric && test.numeric !== '' ? test.numeric : (test.result || '');
            const finalValue = test.type && test.type.includes('select-numeric') && test.ct
              ? `${test.result || ''} (Ct=${test.ct})`
              : rawValue || 'لم تُدخل بعد';
            return `
              <tr>
                <td>${escapeHtml(test.name || '')}</td>
                <td>${escapeHtml(finalValue)}</td>
                <td>${escapeHtml(test.unit || '')}</td>
                <td>${escapeHtml(test.ref || '')}</td>
              </tr>
            `;
          }).join('')
        : '<tr><td colspan="4">لا توجد نتائج متاحة حاليًا.</td></tr>';

      return `
        <!doctype html>
        <html lang="ar" dir="rtl">
        <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width,initial-scale=1" />
          <title>${title}</title>
          <style>
            @page { size: A4 portrait; margin: 14mm; }
            * { box-sizing: border-box; }
            html, body {
              margin: 0;
              padding: 0;
              font-family: "Cairo", Tahoma, Arial, sans-serif;
              color: #14304b;
              background: white;
              -webkit-print-color-adjust: exact;
              print-color-adjust: exact;
            }
            body { padding: 18px; }
            .sheet {
              border: 1px solid #dce7f5;
              border-radius: 24px;
              padding: 24px;
              background: linear-gradient(180deg, #fff, #f8fbff);
            }
            .header {
              display: flex;
              align-items: center;
              justify-content: space-between;
              gap: 14px;
              margin-bottom: 18px;
            }
            .header-main { flex: 1; }
            .print-logo {
              width: 84px;
              height: 84px;
              border-radius: 18px;
              border: 1px solid #dbe7f5;
              overflow: hidden;
              display: grid;
              place-items: center;
              background: white;
              flex-shrink: 0;
            }
            .print-logo img {
              width: 100%;
              height: 100%;
              object-fit: contain;
              display: block;
            }
            h1 { margin: 0 0 8px; font-size: 30px; }
            .lead { color: #5f728d; margin: 0; }

    function buildOnlineResultsPdfHost(html) {
      const parsedDocument = new DOMParser().parseFromString(html, 'text/html');
      const host = document.createElement('div');
      host.id = 'resultsPdfHost';
      host.style.position = 'fixed';
      host.style.left = '-20000px';
      host.style.top = '0';
      host.style.width = '794px';
      host.style.padding = '0';
      host.style.margin = '0';
      host.style.opacity = '1';
      host.style.pointerEvents = 'none';
      host.style.background = '#ffffff';
      host.style.zIndex = '-1';

      const styleEl = document.createElement('style');
      styleEl.textContent = parsedDocument.querySelector('style')?.textContent || '';
      host.appendChild(styleEl);

      const contentEl = document.createElement('div');
      contentEl.innerHTML = parsedDocument.body ? parsedDocument.body.innerHTML : html;
      host.appendChild(contentEl);

      document.body.appendChild(host);
      return host;
    }

    async function downloadOnlineResultsPdf(html, data) {
      if (typeof window.html2canvas !== 'function' || !window.jspdf || !window.jspdf.jsPDF) {
        statusText.innerHTML = '<span class="error">تعذر تحميل مكتبات إنشاء PDF. تحقق من الاتصال ثم أعد المحاولة.</span>';
        return;
      }

      const existingHost = document.getElementById('resultsPdfHost');
      if (existingHost) {
        existingHost.remove();
      }

      const pdfHost = buildOnlineResultsPdfHost(html);
      const originalStatus = statusText ? statusText.innerHTML : '';
      let generationSucceeded = false;
      if (statusText) {
        statusText.innerHTML = '<span class="muted">جار تجهيز ملف PDF، يرجى الانتظار...</span>';
      }

      try {
        const canvas = await window.html2canvas(pdfHost, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false
        });

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const pageHeightPx = Math.floor((canvas.width * pageHeight) / pageWidth);
        let renderedHeight = 0;
        let pageIndex = 0;

        while (renderedHeight < canvas.height) {
          const sliceHeight = Math.min(pageHeightPx, canvas.height - renderedHeight);
          const pageCanvas = document.createElement('canvas');
          pageCanvas.width = canvas.width;
          pageCanvas.height = sliceHeight;

          const pageContext = pageCanvas.getContext('2d');
          pageContext.drawImage(
            canvas,
            0,
            renderedHeight,
            canvas.width,
            sliceHeight,
            0,
            0,
            canvas.width,
            sliceHeight
          );

          const imageData = pageCanvas.toDataURL('image/png');
          const imageHeightMm = (sliceHeight * pageWidth) / canvas.width;

          if (pageIndex > 0) {
            pdf.addPage();
          }
          pdf.addImage(imageData, 'PNG', 0, 0, pageWidth, imageHeightMm, undefined, 'FAST');

          renderedHeight += sliceHeight;
          pageIndex += 1;
        }

        const token = getTokenFromUrl() || data?.patient_id || 'results';
        pdf.save(`results-${String(token).replace(/[^a-zA-Z0-9_-]/g, '_')}.pdf`);
        generationSucceeded = true;

        if (statusText) {
          statusText.textContent = 'تم تجهيز ملف PDF وتنزيله بنجاح.';
        }
      } catch (error) {
        console.error('PDF generation failed', error);
        if (statusText) {
          statusText.innerHTML = '<span class="error">فشل إنشاء ملف PDF. أعد المحاولة أو تحقق من الاتصال.</span>';
        }
      } finally {
        pdfHost.remove();
        if (statusText && originalStatus && generationSucceeded) {
          window.setTimeout(() => {
            statusText.innerHTML = originalStatus;
          }, 2200);
        }
      }
    }

    btnExportResultsPdf.addEventListener('click', () => {
      if (!currentResultData) {
        statusText.innerHTML = '<span class="error">لم يتم تحميل النتائج بعد، لا يمكن إنشاء ملف PDF الآن.</span>';
        return;
      }

      const printDocument = buildOnlineResultsPrintDocument(currentResultData);
      downloadOnlineResultsPdf(printDocument, currentResultData);
    });

    function getSavedCenterName() {
      try {
        const saved = window.localStorage.getItem('lis_center_name');
        return saved && String(saved).trim() ? String(saved).trim() : 'مختبر التحاليل الطبية 2026';
      } catch (e) {
        console.warn('Failed to read center name from localStorage', e);
        return 'مختبر التحاليل الطبية 2026';
      }
    }

    async function loadCenterName() {
      if (API_DISABLED) {
        return;
      }

      for (const url of getApiCandidates('config')) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) continue;

          const config = await response.json();
          if (config && config.centerName) {
            const centerNameEl = document.getElementById('centerName');
            if (centerNameEl) centerNameEl.textContent = config.centerName;
            return;
          }
        } catch (error) {
          continue;
        }
      }

      const centerNameEl = document.getElementById('centerName');
      if (centerNameEl) centerNameEl.textContent = getSavedCenterName();
      console.log('Could not load center name from API candidate; using local settings.');
    }

    loadCenterName();
    loadResults();
  </script>
